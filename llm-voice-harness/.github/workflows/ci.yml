name: CI

on:
  push:
    paths:
      - "llm-voice-harness/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "llm-voice-harness/**"
      - ".github/workflows/ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: llm-voice-harness/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: llm-voice-harness/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: llm-voice-harness/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
